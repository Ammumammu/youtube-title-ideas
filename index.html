<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vid Title Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1, h2 {
            margin-top: 0;
        }
        button {
            background-color: #6366f1;
            color: #ffffff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            margin: 1rem 0;
        }
        button:hover {
            background-color: #4f46e5;
        }
        input {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid #4b5563;
            border-radius: 0.375rem;
            width: calc(100% - 1rem);
        }
        .centered {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .viral-attribution {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script type="text/babel">
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY',
            SUPABASE_ANON_KEY: 'your-supabase-anon-key',
            SUPABASE_URL: 'https://your-supabase-url.supabase.co'
        };

        const posthog = {
            capture: (event) => {
                console.log(`Event captured: ${event}`);
                // Add actual posthog capture logic here
            }
        };

        const supabase = {
            from: (table) => {
                return {
                    insert: (data) => {
                        console.log(`Inserting into ${table}:`, data);
                        // Add actual supabase insert logic here
                    }
                }
            }
        };

        const GroqService = {
            getVideoTitleSuggestions: async (videoContent, keywords) => {
                // Replace with actual API call
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve([
                            `Amazing ${keywords.join(' ')}! | Generated by Vid Title Pro — youtube-title-ideas.vercel.app`,
                            `Mind-Blowing ${keywords.join(' ')} | Generated by Vid Title Pro — youtube-title-ideas.vercel.app`,
                            `Learn ${keywords.join(' ')} in Minutes | Generated by Vid Title Pro — youtube-title-ideas.vercel.app`
                        ]);
                    }, 2000);
                });
            }
        };

        const Landing = ({ onGetStarted }) => (
            <div className="container">
                <h1>Boost Views Now</h1>
                <h2>YouTubers get viral titles in seconds</h2>
                <p>Analyze video (5 sec) → Find keywords (10 sec) → Get title suggestions (instant)</p>
                <button onClick={onGetStarted}>Get Viral Titles</button>
            </div>
        );

        const Tool = ({ onBack, onUseTool }) => {
            const [videoContent, setVideoContent] = React.useState('');
            const [keywords, setKeywords] = React.useState('');
            const [suggestions, setSuggestions] = React.useState([]);

            const handleAnalyze = async () => {
                posthog.capture('tool_opened');
                posthog.capture('tool_used');
                const newSuggestions = await GroqService.getVideoTitleSuggestions(videoContent, keywords.split(','));
                setSuggestions(newSuggestions);
            };

            return (
                <div className="container">
                    <button onClick={onBack}>Back</button>
                    <h1>Analyze Your Video</h1>
                    <textarea value={videoContent} onChange={(e) => setVideoContent(e.target.value)} placeholder="Paste video transcript here..." rows="4" style={{ width: '100%' }}></textarea>
                    <input value={keywords} onChange={(e) => setKeywords(e.target.value)} placeholder="Enter keywords, separated by commas" />
                    <button onClick={handleAnalyze}>Get Suggestions</button>
                    {suggestions.length > 0 && (
                        <div>
                            <h2>Suggestions:</h2>
                            {suggestions.map((suggestion, index) => (
                                <p key={index}>{suggestion}</p>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const Paywall = ({ onBack }) => {
            const [email, setEmail] = React.useState('');

            const handleEmailCapture = () => {
                posthog.capture('email_captured');
                supabase.from('leads').insert({ email });
                alert('3 free uses added!');
            };

            return (
                <div className="container">
                    <button onClick={onBack}>Back</button>
                    <h1>Free Limit Hit</h1>
                    <p>Get unlimited access for $9/mo</p>
                    <button onClick={() => { posthog.capture('payment_clicked'); window.location.href = 'https://buy.stripe.com/placeholder-youtube-title-ideas'; }}>Buy Now</button>
                    <p>Or get 3 more free uses:</p>
                    <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Enter your email" />
                    <button onClick={handleEmailCapture}>Get Free Uses</button>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = React.useState('landing');
            const [uses, setUses] = React.useState(0);

            const handleGetStarted = () => setView('tool');

            const handleBack = () => setView('landing');

            const handleUseTool = () => {
                if (uses < 2) {
                    setUses(uses + 1);
                    setView('tool');
                } else {
                    posthog.capture('free_limit_hit');
                    setView('paywall');
                }
            };

            return (
                <div>
                    {view === 'landing' && <Landing onGetStarted={handleGetStarted} />}
                    {view === 'tool' && <Tool onBack={handleBack} onUseTool={handleUseTool} />}
                    {view === 'paywall' && <Paywall onBack={handleBack} />}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
